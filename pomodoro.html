<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ee5a5a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="番茄钟">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <title>番茄钟</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 30px;
            padding: 60px 80px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 66vw;
            min-height: 66vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            color: #333;
            margin-bottom: 50px;
            font-size: 48px;
        }

        .timer-display {
            font-size: 160px;
            font-weight: bold;
            color: #ee5a5a;
            margin: 50px 0;
            font-family: 'Courier New', monospace;
        }

        .buttons {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 25px 60px;
            font-size: 28px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .start-btn {
            background: #4CAF50;
            color: white;
        }

        .start-btn:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .reset-btn {
            background: #ff9800;
            color: white;
        }

        .reset-btn:hover {
            background: #e68a00;
            transform: translateY(-2px);
        }

        .stop-btn {
            background: #f44336;
            color: white;
        }

        .stop-btn:hover {
            background: #da190b;
            transform: translateY(-2px);
        }

        .status {
            margin-top: 40px;
            font-size: 24px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>番茄钟</h1>
        <div class="timer-display" id="timer">30:00</div>
        <div class="buttons">
            <button class="start-btn" id="startBtn" onclick="startTimer()">开始</button>
            <button class="reset-btn" onclick="resetTimer()">归零</button>
            <button class="stop-btn" onclick="stopTimer()">结束</button>
        </div>
        <div class="status" id="status">准备就绪</div>
    </div>

    <script>
        let totalSeconds = 30 * 60; // 30分钟
        let remainingSeconds = totalSeconds;
        let timerInterval = null;
        let isRunning = false;

        function updateDisplay() {
            const minutes = Math.floor(remainingSeconds / 60);
            const seconds = remainingSeconds % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (isRunning) return;
            if (remainingSeconds <= 0) {
                resetTimer();
            }
            
            isRunning = true;
            document.getElementById('startBtn').textContent = '运行中';
            document.getElementById('status').textContent = '专注中...';
            
            timerInterval = setInterval(() => {
                remainingSeconds--;
                updateDisplay();
                
                if (remainingSeconds <= 0) {
                    clearInterval(timerInterval);
                    isRunning = false;
                    document.getElementById('startBtn').textContent = '开始';
                    document.getElementById('status').textContent = '时间到！休息一下吧';
                    alert('番茄钟结束！休息一下吧！');
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            remainingSeconds = totalSeconds;
            updateDisplay();
            document.getElementById('startBtn').textContent = '开始';
            document.getElementById('status').textContent = '已归零，准备就绪';
        }

        function stopTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            document.getElementById('startBtn').textContent = '开始';
            document.getElementById('status').textContent = '已暂停';
        }

        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker 注册成功'))
                .catch(err => console.log('Service Worker 注册失败', err));
        }
    </script>
</body>
</html>
